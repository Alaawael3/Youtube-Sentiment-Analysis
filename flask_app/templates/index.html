<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sentiment Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --pos: #10b981;
      --neu: #6b7280;
      --neg: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: rgba(124, 58, 237, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    /* Header */
    header {
      margin-bottom: 56px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      border: 1px solid rgba(6,182,212,0.25);
      padding: 6px 14px;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, rgba(124,58,237,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    /* API URL bar */
    .api-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 16px;
      margin-bottom: 32px;
    }

    .api-bar label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .api-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .api-bar input::placeholder { color: var(--muted); }

    /* Input area */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .input-section:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .input-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .input-header span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .char-count {
      font-size: 11px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: transparent;
      border: none;
      outline: none;
      padding: 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
    }

    textarea::placeholder { color: var(--muted); }

    /* Actions */
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 12px 24px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-primary:hover::after { opacity: 1; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover { color: var(--text); border-color: #444; }

    /* Spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-text { opacity: 0.6; }

    /* Results */
    #results { display: none; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .results-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Summary stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.pos::before { background: var(--pos); }
    .stat-card.neu::before { background: var(--neu); }
    .stat-card.neg::before { background: var(--neg); }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card.pos .stat-num { color: var(--pos); }
    .stat-card.neu .stat-num { color: var(--neu); }
    .stat-card.neg .stat-num { color: var(--neg); }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Comment cards */
    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sentiment-tag {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      margin-top: 2px;
    }

    .tag-pos { background: rgba(16,185,129,0.15); color: var(--pos); border: 1px solid rgba(16,185,129,0.3); }
    .tag-neu { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }
    .tag-neg { background: rgba(239,68,68,0.15); color: var(--neg); border: 1px solid rgba(239,68,68,0.3); }

    .comment-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
    }

    .comment-index {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    /* Error state */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 4px;
      padding: 16px;
      color: var(--neg);
      font-size: 13px;
      display: none;
    }

    /* Empty hint */
    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 32px;
    }

    .hint kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2px 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="badge">Sentiment Analysis</div>
    <h1>Comment<br>Predictor</h1>
    <p class="subtitle">Classify YouTube comments as positive, neutral, or negative using LightGBM + TF-IDF</p>
  </header>

  <!-- API URL -->
  <div class="api-bar">
    <label>Endpoint</label>
    <input type="text" id="apiUrl" value="http://13.60.194.38:8080/" placeholder="http://13.60.194.38:8080/"/>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-header">
      <span>Comments Input</span>
      <span class="char-count" id="lineCount">0 comments</span>
    </div>
    <textarea
      id="commentsInput"
      placeholder="Paste one comment per line...&#10;&#10;This video is absolutely amazing!&#10;Not sure how I feel about this...&#10;Complete waste of time honestly."
    ></textarea>
  </div>

  <p class="hint">Enter one comment per line. Press <kbd>Ctrl+Enter</kbd> to analyze.</p>

  <div class="actions">
    <button class="btn-primary" id="analyzeBtn" onclick="analyze()">
      <div class="spinner"></div>
      <span class="btn-text">Analyze Comments</span>
    </button>
    <button class="btn-secondary" onclick="loadSample()">Load Sample</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <h2>Results</h2>
      <span style="font-size:12px;color:var(--muted)" id="resultMeta"></span>
    </div>

    <div class="stats-row">
      <div class="stat-card pos">
        <div class="stat-num" id="posCount">0</div>
        <div class="stat-label">Positive</div>
      </div>
      <div class="stat-card neu">
        <div class="stat-num" id="neuCount">0</div>
        <div class="stat-label">Neutral</div>
      </div>
      <div class="stat-card neg">
        <div class="stat-num" id="negCount">0</div>
        <div class="stat-label">Negative</div>
      </div>
    </div>

    <div class="comment-list" id="commentList"></div>
  </div>

</div>

<script>
  const textarea = document.getElementById('commentsInput');
  const lineCountEl = document.getElementById('lineCount');

  textarea.addEventListener('input', updateCount);
  textarea.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') analyze();
  });

  function updateCount() {
    const lines = textarea.value.split('\n').filter(l => l.trim());
    lineCountEl.textContent = `${lines.length} comment${lines.length !== 1 ? 's' : ''}`;
  }

  function clearAll() {
    textarea.value = '';
    updateCount();
    document.getElementById('results').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  }

  function loadSample() {
    textarea.value = [
      "This is literally the best video I have ever watched, absolutely incredible!",
      "Meh, it was okay I guess, nothing special really",
      "Terrible content, completely misleading and a waste of my time",
      "Love the editing style and the music choices in this one",
      "I don't know what to think about this video honestly",
      "This made me so happy, thank you for creating this!",
      "Awful quality, couldn't even finish watching it"
    ].join('\n');
    updateCount();
  }

  async function analyze() {
    const raw = textarea.value;
    const comments = raw.split('\n').map(l => l.trim()).filter(Boolean);

    if (!comments.length) return;

    const btn = document.getElementById('analyzeBtn');
    const errorBox = document.getElementById('errorBox');
    const resultsEl = document.getElementById('results');

    btn.classList.add('loading');
    btn.disabled = true;
    errorBox.style.display = 'none';
    resultsEl.style.display = 'none';

    const url = document.getElementById('apiUrl').value.trim() || 'http://13.60.194.38:8080/';

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ comments })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `HTTP ${res.status}`);
      }

      const data = await res.json();
      renderResults(data);

    } catch (err) {
      errorBox.textContent = `⚠ ${err.message}`;
      errorBox.style.display = 'block';
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function renderResults(data) {
    const sentimentMap = { '1': 'Positive', '0': 'Neutral', '-1': 'Negative' };
    const tagClass = { '1': 'tag-pos', '0': 'tag-neu', '-1': 'tag-neg' };

    let pos = 0, neu = 0, neg = 0;
    data.forEach(d => {
      const s = String(d.sentiment);
      if (s === '1') pos++;
      else if (s === '0') neu++;
      else neg++;
    });

    document.getElementById('posCount').textContent = pos;
    document.getElementById('neuCount').textContent = neu;
    document.getElementById('negCount').textContent = neg;
    document.getElementById('resultMeta').textContent = `${data.length} comment${data.length !== 1 ? 's' : ''} analyzed`;

    const list = document.getElementById('commentList');
    list.innerHTML = '';

    data.forEach((item, i) => {
      const s = String(item.sentiment);
      const label = sentimentMap[s] || 'Unknown';
      const cls = tagClass[s] || 'tag-neu';

      const card = document.createElement('div');
      card.className = 'comment-card';
      card.style.animationDelay = `${i * 40}ms`;
      card.innerHTML = `
        <div>
          <span class="sentiment-tag ${cls}">${label}</span>
        </div>
        <div>
          <div class="comment-index">#${i + 1}</div>
          <div class="comment-text">${escapeHtml(item.comment)}</div>
        </div>
      `;
      list.appendChild(card);
    });

    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  updateCount();
</script>
</body>
</html>
